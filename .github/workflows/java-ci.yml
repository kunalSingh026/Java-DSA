name: Java DSA Compilation Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Compile All Java Files
      run: |
        # This command finds all .java files in any subfolder and compiles them
        find . -name "*.java" > sources.txt
        javac @sources.txt